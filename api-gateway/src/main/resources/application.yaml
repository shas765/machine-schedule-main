server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: machine-service
          uri: lb://machine-service
          predicates:
            - Path=/machines/**

        - id: maintenance-service
          uri: lb://maintenance-service
          predicates:
            - Path=/maintenance/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka